name: VoteDisha CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          npm install
          npm install --prefix shared
          npm install --prefix functions
          npm install --prefix frontend

      - name: 🧹 Lint codebase
        run: npm run lint:all

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗 Build project
        run: |
          npm run build --prefix functions
          npm run build --prefix frontend

      - name: 🚀 Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: '${{ vars.FIREBASE_PROJECT_ID }}'
        env:
          FIREBASE_CLI_EXPERIMENTS: google-cloud-functions-v2

      - name: 🛰 Deploy Functions and Firestore
        run: npx firebase-tools deploy --only functions,firestore --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: 💬 Post deployment comment
        if: success()
        run: |
          echo "Deployment successful! 🚀"
          echo "Frontend: https://${{ vars.FIREBASE_PROJECT_ID }}.web.app"
