steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--build-arg', 'VITE_API_BASE_URL=$_VITE_API_BASE_URL',
      '-t', 'gcr.io/$PROJECT_ID/votedisha-frontend',
      '-f', 'frontend/Dockerfile',
      '.'
    ]
images:
  - 'gcr.io/$PROJECT_ID/votedisha-frontend'
substitutions:
  _VITE_API_BASE_URL: 'https://asia-south1-votedisha.cloudfunctions.net'
